# Minimal hub addon-manager deployment for e2e testing.
# The root Makefile sed-substitutes the image / HYPERSHIFT_ADDON_IMAGE_NAME
# before apply so the pod never starts with the quay.io placeholder.
# NOT for production use — uses cluster-admin for simplicity.
# In product, Service / APIService / RBAC are provisioned by backplane-operator.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hypershift-addon-manager-sa
  namespace: multicluster-engine
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hypershift-addon-manager-sa-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: hypershift-addon-manager-sa
    namespace: multicluster-engine
---
# HCP proxy ClusterRole (product: backplane-operator)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hypershift-addon-hcp-proxy
rules:
  - apiGroups: ["clusterview.open-cluster-management.io"]
    resources: ["userpermissions"]
    verbs: ["get"]
  - apiGroups: ["cluster.open-cluster-management.io"]
    resources: ["managedclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["operator.open-cluster-management.io"]
    resources: ["multiclusterhubs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["config.openshift.io"]
    resources: ["apiservers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["userextras"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hypershift-addon-hcp-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hypershift-addon-hcp-proxy
subjects:
  - kind: ServiceAccount
    name: hypershift-addon-manager-sa
    namespace: multicluster-engine
---
apiVersion: v1
kind: Service
metadata:
  name: hypershift-addon-hcp-proxy
  namespace: multicluster-engine
  annotations:
    # service-ca-operator (OpenShift) generates a cluster-trusted cert into this Secret.
    # Ignored on non-OpenShift / kind; proxy falls back to a self-signed cert.
    service.beta.openshift.io/serving-cert-secret-name: hypershift-addon-hcp-proxy-tls
spec:
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    app: hypershift-addon-manager
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.hcp.ocm.io
  annotations:
    # service-ca-operator injects the cluster CA bundle into spec.caBundle on OpenShift.
    # No-op on kind; insecureSkipTLSVerify keeps the APIService functional there.
    service.beta.openshift.io/inject-cabundle: "true"
spec:
  group: hcp.ocm.io
  groupPriorityMinimum: 2000
  insecureSkipTLSVerify: true
  service:
    name: hypershift-addon-hcp-proxy
    namespace: multicluster-engine
    port: 443
  version: v1alpha1
  versionPriority: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hypershift-addon-manager
  namespace: multicluster-engine
  labels:
    app: hypershift-addon-manager
spec:
  replicas: 1
  # Recreate avoids RollingUpdate surge where an ImagePullBackOff "old"
  # replica (quay placeholder) blocks rollout status for minutes.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hypershift-addon-manager
  template:
    metadata:
      labels:
        app: hypershift-addon-manager
    spec:
      serviceAccountName: hypershift-addon-manager-sa
      volumes:
        - name: hcp-proxy-tls
          secret:
            secretName: hypershift-addon-hcp-proxy-tls
            optional: true  # absent on kind; proxy falls back to self-signed cert
        # library-go controllercmd writes ephemeral serving certs under /tmp.
        - name: tmp
          emptyDir: {}
      containers:
        - name: hypershift-addon-manager
          # Placeholder — sed-replaced with E2E_IMG/IMG by the root Makefile before apply
          image: quay.io/stolostron/hypershift-addon-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - "./hypershift-addon"
            - "manager"
            - "--namespace=multicluster-engine"
            # kind has no config.openshift.io/APIServer CRD
            - "--disable-tls-watcher"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Overridden by the root Makefile (spoke agent image / install flags)
            - name: HYPERSHIFT_ADDON_IMAGE_NAME
              value: quay.io/stolostron/hypershift-addon-operator:latest
            # OCM cluster-proxy lives in open-cluster-management-addon (see
            # hack/install_cluster_proxy.sh). Product (MCE) co-locates it in
            # POD_NAMESPACE; kind e2e overrides the Service DNS.
            - name: CLUSTER_PROXY_URL
              value: "https://cluster-proxy-addon-user.open-cluster-management-addon.svc:9092"
            # Skip TLS verify for the self-signed user-server serving cert.
            - name: CLUSTER_PROXY_INSECURE
              value: "true"
          volumeMounts:
            - mountPath: /etc/hcp-proxy/tls
              name: hcp-proxy-tls
              readOnly: true
            - mountPath: /tmp
              name: tmp
          ports:
            - name: hcp-proxy
              containerPort: 9443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: hcp-proxy
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: hcp-proxy
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
