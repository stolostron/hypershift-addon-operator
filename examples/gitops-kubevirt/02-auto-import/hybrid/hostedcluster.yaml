apiVersion: hypershift.openshift.io/v1beta1
kind: HostedCluster
metadata:
  name: example-hcp-hybrid
  namespace: clusters
  # ManagedCluster is auto-created by hypershift-addon (hub must not set autoImportDisabled).
  # Higher-level ACM resources (Placement, policies, etc.) are managed in Git for this pattern.
spec:
  release:
    image: quay.io/openshift-release-dev/ocp-release:4.21.0-multi

  pullSecret:
    name: pull-secret

  sshKey:
    name: ssh-key

  networking:
    clusterNetwork:
    - cidr: 10.132.0.0/14
    serviceNetwork:
    - cidr: 172.31.0.0/16
    networkType: OVNKubernetes

  platform:
    type: KubeVirt
    kubevirt:
      baseDomain: example.com

  services:
  - service: APIServer
    servicePublishingStrategy:
      type: LoadBalancer
  - service: OAuthServer
    servicePublishingStrategy:
      type: Route
  - service: Konnectivity
    servicePublishingStrategy:
      type: Route
  - service: Ignition
    servicePublishingStrategy:
      type: Route

  dns:
    baseDomain: example.com

  infraID: example-hcp-hybrid
